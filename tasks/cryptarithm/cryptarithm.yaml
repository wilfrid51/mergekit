task: cryptarithm
dataset_path: jeff4000/cryptarithm_task
output_type: generate_until
validation_split: train
process_docs: !function utils.preprocess
doc_to_text: "{{prompt}}"
doc_to_target: "{{game_data}}"
process_results: !function utils.check_results
generation_kwargs:
  max_gen_toks: 16384
  temperature: 0.0
  until: "<|endoftext|>"
metric_list:
  - metric: accuracy
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0