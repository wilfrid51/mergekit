task: trace
dataset_path: jeff4000/trace_challenge_10000_filtered
output_type: generate_until
validation_split: train
process_docs: !function utils.preprocess
doc_to_text: "{{prompt}}"
doc_to_target: "{{extra}}"
process_results: !function utils.process_results
generation_kwargs:
  max_gen_toks: 1024
  temperature: 0.0
  until: "<|endoftext|>"
metric_list:
  - metric: accuracy
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0